<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BricksVocabulary 2300</title>
    <style>
        :root { --p: #333333; --s: #FFD384; --bg: #F0F4F8; --txt: #2D3436; }
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--txt); text-align: center; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 95%; max-width: 650px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h1 { color: #000000; font-size: 20px; margin-bottom: 25px; font-weight: bold; }

        /* 모드 버튼 */
        .mode-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .btn-mode { padding: 10px 8px; border: 2px solid var(--s); background: white; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 13px; flex: 1 1 45%; min-width: 80px; color: #333; }
        .btn-mode.active { background: var(--s); color: #855b1b; }

        /* 디스플레이 영역 (영어단어 모드) */
        #word-display { font-size: 22px; font-weight: bold; min-height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000000; margin: 20px 0; border: 2px solid #EEEEEE; border-radius: 20px; background: #F9F9F9; padding: 20px; word-break: keep-all; line-height: 1.5; }

        /* 공통 버튼 */
        .btn-main { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button.action { padding: 20px 10px; font-size: 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-start { background: #4CB9E7; }
        .btn-show { background: #FF5F5F; }

        /* 영어단어 퀴즈 스타일 (tset_초등 방식) */
        .btn-meaning { margin-top: 15px; padding: 10px 15px; font-size: 16px; font-weight: bold; background: #f0f0f0; border: 2px dashed #bbb; border-radius: 12px; cursor: pointer; color: #555; }
        .meaning-text { color: #E74C3C; font-size: 22px; font-weight: bold; margin: 15px 0; }
        .quiz-container { margin-top: 10px; text-align: left; width: 100%; border-top: 1px dashed #ccc; padding-top: 15px; }
        .quiz-title { font-size: 16px; color: #555; margin-bottom: 12px; font-weight: bold; text-align: center; }
        .quiz-option { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: white; border: 2px solid #ddd; border-radius: 12px; cursor: pointer; font-size: 16px; transition: 0.2s; color: #333; text-align: left; line-height: 1.4; box-sizing: border-box; }
        .quiz-option:hover { border-color: #4CB9E7; background: #f0faff; }
        .highlight { color: #007AFF; font-weight: bold; }
        .option-meaning { font-size: 14px; color: #666; font-weight: normal; margin-left: 5px; }

        /* 영어문장 스크램블 스타일 (개정판 방식) */
        #sent-display-container { min-height: 160px; margin: 10px 0 5px; border: 2px solid #EEEEEE; border-radius: 20px; background: #F9F9F9; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        #sent-display { font-size: 20px; font-weight: bold; color: #000000; word-break: keep-all; line-height: 1.5; }
        #sent-meaning-display { font-size: 17px; color: #666; font-weight: normal; min-height: 22px; }
        #next-btn-wrapper { margin-top: 5px; }
        .btn-scramble { background: #6C5CE7; color: white; border-radius: 12px; padding: 15px 25px; font-weight: bold; font-size: 18px; border: none; cursor: pointer; margin-bottom: 10px; width: 100%; box-shadow: 0 4px 0 #4834d4; }
        #scramble-area { margin-top: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 50px; }
        .word-chip { padding: 10px 18px; background: white; border-radius: 15px; cursor: pointer; font-weight: bold; border: 2px solid #ddd; font-size: 18px; transition: 0.2s; }
        .word-chip.selected { background: #a29bfe; color: white; border-color: #6C5CE7; }
        .btn-next-inline { background: #2ECC71; color: white; border-radius: 15px; padding: 10px 20px; font-weight: bold; font-size: 16px; border: none; cursor: pointer; box-shadow: 0 3px 0 #27ae60; }
        .btn-what-meaning { background: #F1C40F !important; color: #333 !important; }

        #feedback { margin-top: 5px; font-weight: bold; font-size: 20px; text-align: center; min-height: 30px; }
        .btn-unit { padding: 5px 8px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; color: #555; transition: 0.15s; min-width: 48px; }
        .btn-unit.active { background: #4CB9E7; color: white; border-color: #4CB9E7; }
        .btn-unit-all { background: #FFD384; border-color: #e6b800; color: #855b1b; }
        .btn-unit-all.active { background: #e6b800; color: #5a3e00; }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ 사랑스럽고 멋진 지오의 영어공부 ✨<br><span style="font-size:14px; font-weight:normal; color:#888;">(Bricks Vocabulary 2300)</span></h1>
    <div class="mode-group">
        <button class="btn-mode active" onclick="setMode('enWord', this)">영어단어</button>
        <button class="btn-mode" onclick="setMode('enSent', this)">영어문장</button>
    </div>

    <!-- 영어단어 모드 UI -->
    <div id="word-mode-ui">
        <div id="word-unit-selector" style="margin-bottom:15px;">
            <button onclick="toggleUnitPanel('word')" id="word-unit-toggle" style="width:100%;padding:10px 16px;background:#f8f8f8;border:2px solid #ddd;border-radius:14px;cursor:pointer;font-size:14px;font-weight:bold;color:#555;display:flex;align-items:center;justify-content:space-between;">
                <span>📚 유닛 선택</span>
                <span id="word-unit-label" style="color:#4CB9E7;font-size:13px;">전체 ▼</span>
            </button>
            <div id="word-unit-panel" style="display:none;margin-top:8px;padding:12px;background:#f8f8f8;border-radius:14px;border:2px solid #eee;">
                <div id="word-unit-buttons" style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;"></div>
            </div>
        </div>
        <div id="word-display">지오야 준비됐니?</div>
        <div id="word-btn-area">
            <button class="action btn-start" style="width:100%;" onclick="wordStartFirst()">문제 시작 🚀</button>
        </div>
    </div>

    <!-- 영어문장 모드 UI -->
    <div id="sent-mode-ui" style="display:none;">
        <div id="sent-unit-selector" style="margin-bottom:15px;">
            <button onclick="toggleUnitPanel('sent')" id="sent-unit-toggle" style="width:100%;padding:10px 16px;background:#f8f8f8;border:2px solid #ddd;border-radius:14px;cursor:pointer;font-size:14px;font-weight:bold;color:#555;display:flex;align-items:center;justify-content:space-between;">
                <span>📚 유닛 선택</span>
                <span id="sent-unit-label" style="color:#6C5CE7;font-size:13px;">전체 ▼</span>
            </button>
            <div id="sent-unit-panel" style="display:none;margin-top:8px;padding:12px;background:#f8f8f8;border-radius:14px;border:2px solid #eee;">
                <div id="sent-unit-buttons" style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;"></div>
            </div>
        </div>
        <div id="sent-display-container">
            <div id="sent-display">지오야 준비됐니?</div>
            <div id="sent-meaning-display"></div>
            <div id="next-btn-wrapper"></div>
        </div>
        <div id="scramble-wrapper">
            <button class="btn-scramble" onclick="startScramble()">문제시작 🧩</button>
        </div>
        <div id="scramble-area"></div>
    </div>

    <div id="feedback"></div>
    <div style="margin-top: 30px; text-align: center;">
        <a href="index.html" style="display: inline-block; padding: 14px 30px; background: #AAAAAA; color: white; border-radius: 20px; font-size: 16px; font-weight: bold; text-decoration: none; box-shadow: 0 4px 0 rgba(0,0,0,0.15);">메인화면으로 🏠</a>
    </div>
</div>

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if(type === 'correct') {
            osc.frequency.setValueAtTime(523, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    function playTTS(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function setMode(mode, btn) {

        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('feedback').innerText = '';
        if(mode === 'enWord') {
            document.getElementById('word-mode-ui').style.display = 'block';
            document.getElementById('sent-mode-ui').style.display = 'none';
            wordResetUI();
        } else {
            document.getElementById('word-mode-ui').style.display = 'none';
            document.getElementById('sent-mode-ui').style.display = 'block';
            sentResetUI();
        }
    }

    // ===================== 유닛 선택 시스템 =====================
    const WORD_PER_UNIT = 20;
    const SENT_PER_UNIT = 4;
    const TOTAL_UNITS = 30;

    let selectedWordUnit = 0; // 0 = 전체
    let selectedSentUnit = 0;

    function toggleUnitPanel(mode) {
        const panel = document.getElementById(mode === 'word' ? 'word-unit-panel' : 'sent-unit-panel');
        const labelEl = document.getElementById(mode === 'word' ? 'word-unit-label' : 'sent-unit-label');
        const isOpen = panel.style.display !== 'none';
        panel.style.display = isOpen ? 'none' : 'block';
        const cur = mode === 'word' ? selectedWordUnit : selectedSentUnit;
        const name = cur === 0 ? '전체' : 'Unit' + String(cur).padStart(2, '0');
        labelEl.textContent = name + (isOpen ? ' ▼' : ' ▲');
    }

    function updateUnitLabel(mode) {
        const cur = mode === 'word' ? selectedWordUnit : selectedSentUnit;
        const name = cur === 0 ? '전체' : 'Unit' + String(cur).padStart(2, '0');
        const labelEl = document.getElementById(mode === 'word' ? 'word-unit-label' : 'sent-unit-label');
        if (labelEl) labelEl.textContent = name + ' ▼';
    }


    function buildUnitButtons(containerId, mode) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';

        const allBtn = document.createElement('button');
        allBtn.className = 'btn-unit btn-unit-all' + (mode === 'word' ? (selectedWordUnit === 0 ? ' active' : '') : (selectedSentUnit === 0 ? ' active' : ''));
        allBtn.textContent = '전체';
        allBtn.onclick = () => selectUnit(0, mode);
        container.appendChild(allBtn);

        for (let i = 1; i <= TOTAL_UNITS; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn-unit' + (mode === 'word' ? (selectedWordUnit === i ? ' active' : '') : (selectedSentUnit === i ? ' active' : ''));
            btn.textContent = 'U' + String(i).padStart(2, '0');
            btn.id = (mode === 'word' ? 'wunit-' : 'sunit-') + i;
            btn.onclick = () => selectUnit(i, mode);
            container.appendChild(btn);
        }
    }

    function selectUnit(unitNum, mode) {
        if (mode === 'word') {
            selectedWordUnit = unitNum;
            buildUnitButtons('word-unit-buttons', 'word');
            // 패널 닫기
            document.getElementById('word-unit-panel').style.display = 'none';
            updateUnitLabel('word');
            wordResetUI();
        } else {
            selectedSentUnit = unitNum;
            buildUnitButtons('sent-unit-buttons', 'sent');
            document.getElementById('sent-unit-panel').style.display = 'none';
            updateUnitLabel('sent');
            sentResetUI();
        }
    }

    function getActiveWordData() {
        if (selectedWordUnit === 0) return enWordData;
        return enWordData.filter(d => d.unit === selectedWordUnit);
    }

    function getActiveSentData() {
        if (selectedSentUnit === 0) return enSentData;
        return enSentData.filter(d => d.unit === selectedSentUnit);
    }

    // ===================== 영어단어 파트 =====================
    let wordCurrentText = '';
    let wordIsRevealed = false;
    let wordQuizOptions = [];
    let wordHasStarted = false; // 첫 문제 이후 true

    function wordResetUI() {
        document.getElementById('word-display').innerHTML = '지오야 준비됐니?';
        document.getElementById('feedback').innerText = '';
        wordCurrentText = '';
        wordIsRevealed = false;
        wordHasStarted = false;
        document.getElementById('word-btn-area').innerHTML =
            '<button class="action btn-start" style="width:100%;" onclick="wordStartFirst()">문제 시작 🚀</button>';
    }

    function wordStartFirst() {
        wordNextQuiz();
    }

    function wordNextQuiz() {
        const data = getActiveWordData();
        if (!data || data.length === 0) return;
        const item = data[Math.floor(Math.random() * data.length)];
        wordCurrentText = item.w;
        document.getElementById('word-display').innerHTML = '<span style="font-size:60px;">🤔</span><div style="font-size:18px; color:#888; margin-top:8px;">따라해봐!</div>';
        document.getElementById('feedback').innerText = '';
        wordIsRevealed = false;
        wordHasStarted = true;
        // Show 다시듣기 + 정답확인 buttons
        document.getElementById('word-btn-area').innerHTML =
            '<div class="btn-main">' +
            '<button class="action btn-start" onclick="playTTS(wordCurrentText)">다시 듣기 🔊</button>' +
            '<button class="action btn-show" id="word-answer-btn" onclick="wordShowAnswerAndChange()">정답 확인 ✅</button>' +
            '</div>';
        playTTS(wordCurrentText);
    }

    function wordShowAnswerAndChange() {
        if (!wordCurrentText) return;
        wordIsRevealed = true;
        document.getElementById('word-display').innerHTML = `
            <div style="font-size:26px; color:#333; margin-bottom:10px;">${wordCurrentText}</div>
            <button class="btn-meaning" onclick="wordRevealMeaningAndQuiz()">🤔 무슨 뜻? 🤔</button>
            <div id="quizArea"></div>
        `;
        // Change 정답확인 button to 다음 문제, keep 다시듣기
        document.getElementById('word-btn-area').innerHTML =
            '<div class="btn-main">' +
            '<button class="action btn-start" onclick="playTTS(wordCurrentText)">다시 듣기 🔊</button>' +
            '<button class="action btn-show" style="background:#2ECC71;" onclick="wordNextQuiz()">다음 문제 ➡️</button>' +
            '</div>';
    }

    function wordShowAnswer() {
        wordShowAnswerAndChange();
    }

    function highlightWord(sentence, word) {
        if (!sentence || !word) return sentence;
        const regex = new RegExp(`(${word})`, 'gi');
        return sentence.replace(regex, '<span class="highlight">$1</span>');
    }

    // enSentData에서 해당 단어가 포함된 문장 찾기 (대소문자 무시)
    function findCorrectSentence(word, wordMeaning) {
        // 1순위: enSentData에서 해당 단어가 직접 포함된 문장
        const re = new RegExp('\\b' + word + '\\b', 'i');
        const directMatches = enSentData.filter(d => re.test(d.w));
        if (directMatches.length > 0) {
            return directMatches[Math.floor(Math.random() * directMatches.length)].w;
        }

        // 2순위: enSentData 문장에서 같은 품사 자리 단어를 문제 단어로 교체
        const posClass = getPosClass(wordMeaning);
        const modals   = new Set(['will','can','should','would','could','must','may','might','did','does','do','shall']);
        const articles = new Set(['the','a','an','my','his','her','its','our','their','your','this','that','these','those','no']);
        const copulas  = new Set(['is','are','was','were','looks','seems','feel','feels','felt','become','becomes','became','am']);

        const shuffled = [...enSentData].sort(() => Math.random() - 0.5);
        for (const sentItem of shuffled) {
            const sentence = sentItem.w;
            if (re.test(sentence)) continue; // 이미 단어 있는 문장 제외
            const tokens = sentence.replace(/[.,!?'"]/g, '').split(/\s+/);

            let matchSlots = [];
            for (let i = 1; i < tokens.length; i++) {
                const prev = tokens[i - 1].toLowerCase().replace(/[.,!?'"]/g, '');
                const cur  = tokens[i].replace(/[.,!?'"]/g, '');
                if (!cur || cur.length < 2) continue;
                if (/^[A-Z]/.test(cur)) continue; // 고유명사 제외
                if (/^\d/.test(cur)) continue;

                // 품사 일치 자리 찾기
                if (posClass === 'verb'  && modals.has(prev))   matchSlots.push(cur);
                if (posClass === 'noun'  && articles.has(prev)) matchSlots.push(cur);
                if (posClass === 'adj'   && copulas.has(prev))  matchSlots.push(cur);
                if (posClass === 'adv'   && copulas.has(prev))  matchSlots.push(cur);
                // prep/other: 관사 뒤 명사 자리 시도
                if ((posClass === 'prep' || posClass === 'other') && articles.has(prev)) matchSlots.push(cur);
            }

            matchSlots = [...new Set(matchSlots)].filter(w =>
                w.toLowerCase() !== word.toLowerCase()
            );
            if (matchSlots.length === 0) continue;

            const pick = matchSlots[Math.floor(Math.random() * matchSlots.length)];
            const result = sentence.replace(new RegExp('\\b' + pick + '\\b', 'i'), word);
            if (result !== sentence) return result;
        }

        // 3순위: 그래도 없으면 item.ex (최후 수단)
        return null;
    }

    // enSentData에서 랜덤 문장을 골라 특정 단어 하나를 targetWord로 교체해 오답 생성
    // 문제 단어의 품사 분류
    function getPosClass(meaning) {
        if (/^v\./.test(meaning)) return 'verb';
        if (/^n\./.test(meaning)) return 'noun';
        if (/^adj\./.test(meaning)) return 'adj';
        if (/^adv\./.test(meaning)) return 'adv';
        if (/^prep\./.test(meaning)) return 'prep';
        return 'other';
    }

    function makeWrongFromSentData(targetWord, targetMeaning, usedSentences) {
        const reTarget = new RegExp('\\b' + targetWord + '\\b', 'i');
        const posClass = getPosClass(targetMeaning);

        const pool = enSentData.filter(d =>
            !reTarget.test(d.w) && !usedSentences.includes(d.w)
        );
        if (pool.length === 0) return null;

        const shuffled = [...pool].sort(() => Math.random() - 0.5);

        const modals = new Set(['will','can','should','would','could','must','may','might','did','does','do','shall']);
        const articles = new Set(['the','a','an','my','his','her','its','our','their','your','this','that','these','those','no']);
        const copulas = new Set(['is','are','was','were','looks','seems','feel','feels','felt','become','becomes','became','am']);

        for (const sentItem of shuffled) {
            const sentence = sentItem.w;
            const tokens = sentence.replace(/[.,!?'"]/g, '').split(/\s+/);

            let verbSlots = [];
            let nounSlots = [];
            let adjSlots  = [];

            for (let i = 1; i < tokens.length; i++) {
                const prev = tokens[i - 1].toLowerCase().replace(/[.,!?'"]/g, '');
                const cur  = tokens[i].replace(/[.,!?'"]/g, '');
                if (!cur || cur.length < 3) continue;
                if (/^[A-Z]/.test(cur)) continue;
                if (/^\d/.test(cur)) continue;
                if (modals.has(prev))   verbSlots.push(cur);
                else if (articles.has(prev)) nounSlots.push(cur);
                else if (copulas.has(prev))  adjSlots.push(cur);
            }

            // 품사 불일치 자리에서 교체 → 무조건 틀린 문장
            let pickPool = [];
            if (posClass === 'verb')       pickPool = [...nounSlots, ...adjSlots];
            else if (posClass === 'noun')  pickPool = [...verbSlots, ...adjSlots];
            else if (posClass === 'adj')   pickPool = [...verbSlots, ...nounSlots];
            else                           pickPool = [...verbSlots, ...nounSlots, ...adjSlots];

            pickPool = [...new Set(pickPool)].filter(w =>
                w.toLowerCase() !== targetWord.toLowerCase()
            );
            if (pickPool.length === 0) continue;

            const pick = pickPool[Math.floor(Math.random() * pickPool.length)];
            const wrongSent = sentence.replace(
                new RegExp('\\b' + pick + '\\b', 'i'),
                targetWord
            );
            if (wrongSent !== sentence) return wrongSent;
        }
        return null;
    }

    function wordRevealMeaningAndQuiz() {
        const quizArea = document.getElementById('quizArea');
        const item = enWordData.find(d => d.w === wordCurrentText);
        if (!item) return;

        let rawM = item.m;
        let posMatch = rawM.match(/^([a-z]+\.(?:\s*[a-z]+\.)?)/);
        let posTag = posMatch ? `<span style="font-size:14px; color:#888; font-weight:normal; background:#f0f0f0; padding:2px 6px; border-radius:6px; margin-right:6px;">${posMatch[1]}</span>` : '';
        let defText = posMatch ? rawM.slice(posMatch[0].length).trim() : rawM;
        let html = `<div class="meaning-text">${posTag}${defText}</div>`;

        // 정답: enSentData에서 해당 단어 포함 문장 찾기 → 없으면 같은 품사 자리 교체 → 최후 수단 item.ex
        const correctSentence = item.ex;

        // 오답 2개: enSentData 문장에서 품사 불일치 자리에 단어 교체 → 확실히 틀린 문장
        const usedSentences = [correctSentence];
        let wrong1 = makeWrongFromSentData(wordCurrentText, rawM, usedSentences);
        if (wrong1) usedSentences.push(wrong1);
        let wrong2 = makeWrongFromSentData(wordCurrentText, rawM, usedSentences);

        // fallback: enSentData에서 문장을 구하지 못한 경우 item.wx 사용
        if (!wrong1) wrong1 = item.wx ? item.wx[0] : item.ex;
        if (!wrong2) wrong2 = item.wx ? item.wx[1] : item.ex;

        wordQuizOptions = [];
        wordQuizOptions.push({ text: correctSentence, correct: true });
        wordQuizOptions.push({ text: wrong1, correct: false });
        wordQuizOptions.push({ text: wrong2, correct: false });
        wordQuizOptions.sort(() => Math.random() - 0.5);

        html += `<div class="quiz-container">
            <div class="quiz-title">단어의 쓰임이 올바른 것은?</div>`;
        wordQuizOptions.forEach((opt, idx) => {
            let displayText = highlightWord(opt.text, wordCurrentText);
            html += `<button class="quiz-option" id="wopt-${idx}" onclick="wordCheckAnswer(${opt.correct}, ${idx})">${idx+1}. ${displayText}</button>`;
        });
        html += `</div>`;
        quizArea.innerHTML = html;
        document.querySelector('.btn-meaning').style.display = 'none';
    }

    function getExMeaning(sentence, word, fullMeaning) {
        const s = sentence.trim();
        // fullMeaning 에서 한글 뜻만 추출 (품사 태그 제거)
        const pm = fullMeaning.match(/^([a-z]+\.(?:\s*[a-z]+\.)?\s*)/);
        const def = pm ? fullMeaning.slice(pm[0].length).trim() : fullMeaning;
        // 쉼표로 첫 번째 뜻만 사용
        const def1 = def.split(/[,，]/)[0].trim();

        const patterns = [
            [/^I can \w+ it\.$/, `나는 그것을 ${def1} 수 있어.`],
            [/^I see a \w+ here\.$/, `여기에 ${def1}이/가 있어.`],
            [/^Look at the \w+!$/, `저 ${def1}을/를 봐!`],
            [/^The \w+ is big\.$/, `그 ${def1}은/는 커.`],
            [/^She looks \w+\.$/, `그녀는 ${def1}해 보여.`],
            [/^It is very \w+\.$/, `그건 정말 ${def1}해.`],
            [/^How \w+ it is!$/, `정말 ${def1}하구나!`],
            [/^She will \w+ now\.$/, `그녀는 지금 ${def1}할 거야.`],
            [/^She has a \w+\.$/, `그녀는 ${def1}을/를 가지고 있어.`],
            [/^We need a \w+\.$/, `우리는 ${def1}이/가 필요해.`],
            [/^He likes to \w+\.$/, `그는 ${def1}하는 걸 좋아해.`],
            [/^Let's \w+ together\.$/, `같이 ${def1}하자!`],
            [/^We \w+ every day\.$/, `우리는 매일 ${def1}해.`],
            [/^I can \w+ it\.$/, `나는 그것을 ${def1} 수 있어.`],
            [/^The \w+ cat is here\.$/, `${def1} 고양이가 여기 있어.`],
            [/^This is a \w+ day\.$/, `오늘은 ${def1} 날이야.`],
            [/^He sits \w+ the tree\.$/, `그는 나무 ${def1}에 앉아 있어.`],
            [/^She stands \w+ the door\.$/, `그녀는 문 ${def1}에 서 있어.`],
            [/^Look \w+ the wall\.$/, `벽 ${def1}을 봐.`],
            [/^The cat is \w+ the box\.$/, `고양이가 상자 ${def1}에 있어.`],
        ];
        for (const [re, result] of patterns) {
            if (re.test(s)) return result;
        }
        return `(${def1})`;
    }

    function wordCheckAnswer(isCorrect, idx) {
        const feedback = document.getElementById('feedback');
        const alreadyAnswered = !!document.querySelector('.quiz-option[data-answered]');

        if(isCorrect) {
            playTTS(wordQuizOptions[idx].text);
            feedback.innerText = '잘했어 지오야! 👍';
            feedback.style.color = '#007AFF';

            if (!alreadyAnswered) {
                playSound('correct');
                const targetBtn = document.getElementById(`wopt-${idx}`);
                if (targetBtn) {
                    targetBtn.dataset.answered = 'true';
                    targetBtn.style.background = '#e8f8f5';
                    targetBtn.style.borderColor = '#27ae60';
                    // 오답 버튼만 비활성화
                    document.querySelectorAll('.quiz-option').forEach(b => {
                        if (!b.dataset.answered) {
                            b.disabled = true;
                            b.onclick = null;
                        }
                    });
                    // 한글 해석 한 번만 추가
                    const item = enWordData.find(d => d.w === wordCurrentText);
                    if (item) {
                        const sentMeaning = item.em && item.em.trim()
                            ? item.em
                            : getExMeaning(item.ex, wordCurrentText, item.m);
                        targetBtn.innerHTML = targetBtn.innerHTML + ` <span class="option-meaning">(${sentMeaning})</span>`;
                    }
                }
            }
        } else {
            if (alreadyAnswered) return;
            playSound('wrong');
            feedback.innerText = '다시 생각해보세요! ❌';
            feedback.style.color = '#e74c3c';
            const btn = document.getElementById(`wopt-${idx}`);
            if(btn) btn.style.background = '#fdedec';
        }
    }

    // ===================== 영어문장 파트 =====================
    let sentCurrentItem = null;
    let userScrambleAnswer = [];
    let correctWordsSequence = [];
    let sentHasStarted = false;

    function sentResetUI() {
        document.getElementById('sent-display').innerText = '지오야 준비됐니?';
        document.getElementById('sent-meaning-display').innerText = '';
        document.getElementById('next-btn-wrapper').innerHTML = '';
        document.getElementById('scramble-area').innerHTML = '';
        document.getElementById('scramble-wrapper').style.display = 'block';
        document.getElementById('feedback').innerText = '';
        userScrambleAnswer = [];
        sentHasStarted = false;
        // 문제보기 버튼 텍스트 초기화
        const scrBtn = document.querySelector('#scramble-wrapper .btn-scramble');
        if (scrBtn) scrBtn.textContent = '문제시작 🧩';
    }

    function startScramble() {
        const data = getActiveSentData();
        sentCurrentItem = data[Math.floor(Math.random() * data.length)];
        document.getElementById('sent-display').innerHTML = '<span style="font-size:60px;">🤔</span><div style="font-size:18px; color:#888; margin-top:8px;">순서대로 맞춰봐!</div>';
        document.getElementById('sent-meaning-display').innerText = '';
        document.getElementById('next-btn-wrapper').innerHTML = '';
        document.getElementById('scramble-area').innerHTML = '';
        document.getElementById('scramble-wrapper').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        userScrambleAnswer = [];
        sentHasStarted = true;

        let sentence = sentCurrentItem.w;
        const hasQuestion = sentence.trimEnd().endsWith('?');
        const endPunct = hasQuestion ? '?' : '.';
        let rawWords = sentence.trim().replace(/[?.!,;:]/g, '').split(/\s+/).filter(w => w.length > 0);

        correctWordsSequence = rawWords.map(w => w.toLowerCase());
        correctWordsSequence.push(endPunct);

        let displayWords = [...rawWords];
        displayWords.push(endPunct);

        const shuffledWords = [...displayWords].sort(() => Math.random() - 0.5);
        const area = document.getElementById('scramble-area');
        shuffledWords.forEach(word => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerText = word;
            chip.onclick = () => selectWord(chip);
            area.appendChild(chip);
        });
    }

    function selectWord(chip) {
        if (chip.classList.contains('selected')) return;
        const clickedWord = chip.innerText.toLowerCase();
        const targetWord = correctWordsSequence[userScrambleAnswer.length].toLowerCase();

        if (clickedWord === targetWord) {
            chip.classList.add('selected');
            userScrambleAnswer.push(chip.innerText);
            if (userScrambleAnswer.length === correctWordsSequence.length) {
                playTTS(sentCurrentItem.w);
                const feedbackEl = document.getElementById('feedback');
                feedbackEl.innerText = '잘했어 지오야! 👍';
                feedbackEl.style.color = '#007AFF';
                document.getElementById('sent-display').innerText = sentCurrentItem.w;
                document.getElementById('scramble-area').innerHTML = '';
                document.getElementById('next-btn-wrapper').innerHTML =
                    `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">` +
                    `<button class="btn-next-inline" style="background:#4CB9E7;box-shadow:0 3px 0 #2a9abf;" onclick="playTTS(sentCurrentItem.w)">다시 듣기 🔊</button>` +
                    `<button class="btn-next-inline" style="background:#F1C40F;color:#333;box-shadow:0 3px 0 #d4a017;" onclick="showSentMeaning()">무슨 뜻? 🤔</button>` +
                    `</div>`;
            }
        } else {
            playSound('wrong');
            document.getElementById('feedback').innerText = '어라? 다시 해보자!';
        }
    }

    function showSentMeaning() {
        document.getElementById('sent-meaning-display').innerText = '(' + sentCurrentItem.m + ')';
        document.getElementById('next-btn-wrapper').innerHTML =
            `<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">` +
            `<button class="btn-next-inline" style="background:#4CB9E7;box-shadow:0 3px 0 #2a9abf;" onclick="playTTS(sentCurrentItem.w)">다시 듣기 🔊</button>` +
            `<button class="btn-next-inline" onclick="startScramble()">다음 문제 ➡️</button>` +
            `</div>`;
    }

    // ===================== 초기화 =====================
    buildUnitButtons('word-unit-buttons', 'word');
    buildUnitButtons('sent-unit-buttons', 'sent');

</script>
