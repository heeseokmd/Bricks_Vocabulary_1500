<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지오의 영어공부</title>
    <style>
        :root {
            --primary-bg: #fffaf0; /* 따뜻한 느낌의 연한 크림색 */
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --accent-color: #ff7675; /* 포인트 컬러 (사랑스러운 느낌) */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3.5rem 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 480px;
            border: 2px solid #ffecd2;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 1.7rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 18px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            filter: brightness(1.1);
        }

        /* 부드러운 파스텔 톤 그라데이션 */
        .v300  { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .v900  { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .v1500 { background: linear-gradient(135deg, #fab1a0, #ff7675); }
        .v2300 { background: linear-gradient(135deg, #55efc4, #00b894); }
        .v3100 { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #636e72; }

    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">✨📚🌟</span>
        <h1>사랑스럽고 멋진<br>지오의 영어공부</h1>
        <p class="subtitle">Bricks Vocabulary Series</p>
        
        <div class="button-group">
            <a href="https://example.com/bricks300" class="btn v300">Bricks Vocabulary 300</a>
            <a href="https://example.com/bricks900" class="btn v900">Bricks Vocabulary 900</a>
            <a href="https://example.com/bricks1500" class="btn v1500">Bricks Vocabulary 1500</a>
            <a href="https://example.com/bricks2300" class="btn v2300">Bricks Vocabulary 2300</a>
            <a href="https://example.com/bricks3100" class="btn v3100">Bricks Vocabulary 3100</a>
        </div>
    </div>

</body>
</html>
