<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지오의 영어공부</title>
    <style>
        :root {
            --primary-bg: #fffaf0; 
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --accent-color: #ff7675;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px 0; /* 위아래 여백 추가 */
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 480px;
            border: 2px solid #ffecd2;
        }

        .emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.4;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px; /* 간격을 살짝 좁혀서 전체 높이 조절 */
        }

        .btn {
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
            color: white;
            border-radius: 16px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            filter: brightness(1.05);
        }

        /* 단계별 컬러 그라데이션 확장 */
        .v300  { background: linear-gradient(135deg, #74b9ff, #0984e3); }
        .v900  { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .v1500 { background: linear-gradient(135deg, #fab1a0, #ff7675); }
        .v2300 { background: linear-gradient(135deg, #55efc4, #00b894); }
        .v3100 { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #636e72; }
        .v3900 { background: linear-gradient(135deg, #fd79a8, #e84393); } /* 핑크 톤 추가 */
        .v4800 { background: linear-gradient(135deg, #636e72, #2d3436); } /* 다크 톤으로 최종단계 강조 */

    </style>
</head>
<body>

    <div class="container">
        <span class="emoji">✨📚🌟</span>
        <h1>사랑스럽고 멋진<br>지오의 영어공부</h1>
        <p class="subtitle">Bricks Vocabulary Series</p>
        
        <div class="button-group">
            <a href="Bricks_Vocabulary_300.html" class="btn v300">Bricks Vocabulary 300</a>
            <a href="Bricks_Vocabulary_900.html" class="btn v900">Bricks Vocabulary 900</a>
            <a href="Bricks_Vocabulary_1500.html" class="btn v1500">Bricks Vocabulary 1500</a>
            <a href="Bricks_Vocabulary_2300.html" class="btn v2300">Bricks Vocabulary 2300</a>
            <a href="Bricks_Vocabulary_3100.html" class="btn v3100">Bricks Vocabulary 3100</a>
            <a href="Bricks_Vocabulary_3900.html" class="btn v3900">Bricks Vocabulary 3900</a>
            <a href="Bricks_Vocabulary_4800.html" class="btn v4800">Bricks Vocabulary 4800</a>
        </div>
    </div>

</body>
</html>
